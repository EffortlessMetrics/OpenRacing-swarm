# OpenRacing Clippy debt ledger.
#
# This file tracks lints that are intentionally `allow` (or `absent`)
# instead of their `target_level`, with an owner and a target promotion
# PR. It is the source of truth for "what is still warn-stage on
# purpose".
#
# A separate file from policy/clippy-lints.toml so the planned MSRV
# flips (which are time-based) don't get mixed up with the burndown
# ledger (which is debt-based).
#
# Validate with: python scripts/policy_lint.py
#
# Possible `level` values:
#
#   "allow"  -> lint is in [workspace.lints] at level = "allow".
#   "warn"   -> lint is in [workspace.lints] at level = "warn".
#   "absent" -> lint is intentionally NOT yet present in
#               [workspace.lints]; it will be introduced by `target_pr`.
#               policy_lint.py flags drift if it appears anyway.
#
# Stage A: every entry below is at `absent` because Stage A introduces
# NO new clippy enforcement at the workspace level (existing CI already
# runs `cargo clippy ... -D warnings -D clippy::unwrap_used ...` for
# non-test crates; introducing new workspace warns/denies would
# regress unrelated jobs). Each entry is promoted by its named
# `target_pr` after the corresponding burndown lands.

schema_version = "1.0"

