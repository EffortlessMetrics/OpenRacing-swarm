schema_version = 1

[public]
packages = [
  "openracing",
  "openracing-engine",
  "openracing-ffb",
  "openracing-calibration",
  "openracing-curves",
  "openracing-profile",
  "openracing-hid",
  "openracing-pidff",
  "openracing-moza",
  "openracing-firmware-update",
  "openracing-plugin-abi",
  "openracing-plugin-sdk",
  "openracing-telemetry",
  "openracing-telemetry-adapters",
  "openracing-telemetry-config",
  "openracing-telemetry-recorder",
  "openracing-service",
  "wheelctl",
]

[internal]
packages = [
  "openracing-tools",
  "workspace-hack",
  "racing-wheel-ui",
  "racing-wheel-integration-tests",
  "compat",
  "openracing-test-helpers",
  "openracing-plugin-examples",
]

