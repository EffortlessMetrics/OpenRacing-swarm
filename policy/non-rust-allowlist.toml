# OpenRacing non-Rust file policy.
#
# Every non-Rust file (other than Cargo.toml/Cargo.lock and similar Rust-
# native config) must match an allowlist entry below, or be excluded.
# This makes the supported non-Rust surface area explicit and reviewable
# instead of an ever-growing junk drawer.
#
# Schema is documented in docs/FILE_POLICY.md.
# Validate with: python scripts/policy_file.py
#
# Recognized fields (all required unless marked optional):
#   glob          glob relative to repo root, OR
#   path          exact path relative to repo root
#   kind          short stable identifier (no spaces)
#   owner         team or area owner (matches CODEOWNERS-style label)
#   surface       ci | docs | fixtures | tooling | packaging | proto |
#                 schema | shader | editor | website | badge | scripts |
#                 hardware | telemetry | thirdparty
#   classification    config | test | production | tooling | generated | thirdparty
#   reason        human reason this surface exists
#   covered_by    list of commands or workflows that exercise it
#   expires       optional ISO date for time-boxed exceptions
#   retired       optional bool; entry exists but is no longer active

schema_version = "1.0"

# --- Repository-level meta files --------------------------------------------

[[allow]]
glob = "*.md"
kind = "doc_root"
owner = "core"
surface = "docs"
classification = "production"
reason = "Top-level project docs (README, CHANGELOG, RELEASING, ROADMAP, AGENTS, CLAUDE)."
covered_by = ["python scripts/validate_changelog.py"]

[[allow]]
glob = "LICENSE-*"
kind = "license"
owner = "core"
surface = "docs"
classification = "production"
reason = "Dual-license text required for crates.io publish."
covered_by = ["cargo deny check"]

[[allow]]
path = ".gitignore"
kind = "vcs_config"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Standard git ignore rules."
covered_by = []

[[allow]]
path = ".gitattributes"
kind = "vcs_config"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Standard git attributes."
covered_by = []

# --- Rust-adjacent config ---------------------------------------------------

[[allow]]
glob = "Cargo.lock"
kind = "cargo_lockfile"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Cargo lockfile pinning workspace dependency graph."
covered_by = ["cargo build --workspace"]

[[allow]]
glob = "rust-toolchain.toml"
kind = "toolchain_pin"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Pin nightly toolchain across the workspace."
covered_by = ["cargo build --workspace"]

[[allow]]
glob = "rustfmt.toml"
kind = "rustfmt_config"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Workspace formatting rules."
covered_by = ["cargo fmt --all -- --check"]

[[allow]]
glob = "clippy.toml"
kind = "clippy_config"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Clippy thresholds. Test carveouts are forbidden by policy_lint.py."
covered_by = ["python scripts/policy_lint.py"]

[[allow]]
glob = "deny.toml"
kind = "cargo_deny_config"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Supply-chain policy for cargo-deny."
covered_by = ["cargo deny check"]

[[allow]]
glob = "mutants.toml"
kind = "mutants_config"
owner = "core"
surface = "tooling"
classification = "config"
reason = "cargo-mutants configuration for mutation testing."
covered_by = ["bash scripts/run_mutation_tests.sh"]

[[allow]]
glob = "flake.nix"
kind = "nix_flake"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Reproducible dev shell via Nix flakes."
covered_by = ["bash scripts/ci_nix.sh"]

