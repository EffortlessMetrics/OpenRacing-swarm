glob = ".github/**/*.md"
kind = "ci_doc"
owner = "release/ci"
surface = "ci"
classification = "production"
reason = "Issue/PR templates and contributing notes rendered by GitHub."
covered_by = []

[[allow]]
glob = ".github/**/CODEOWNERS"
kind = "codeowners"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "Code ownership routing for GitHub reviews."
covered_by = []

[[allow]]
path = "codecov.yml"
kind = "ci_coverage_policy"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "Codecov status and reporting configuration for cargo-llvm-cov coverage uploads."
