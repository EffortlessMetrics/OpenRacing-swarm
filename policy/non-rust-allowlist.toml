# --- Policy / docs ----------------------------------------------------------

[[allow]]
glob = "policy/*.toml"
kind = "policy_doc"
owner = "core"
surface = "tooling"
classification = "config"
reason = "Declarative repo policy validated by xtask checks / scripts."
covered_by = [
  "python scripts/policy_lint.py",
  "python scripts/policy_no_panic.py",
  "python scripts/policy_file.py",
]

[[allow]]
glob = "docs/**/*.md"
kind = "design_doc"
owner = "core"
surface = "docs"
classification = "production"
reason = "Architecture/design/ADR/policy documentation."
covered_by = ["python scripts/validate_adr.py"]

[[allow]]
glob = "docs/adr/*.md"
kind = "adr"
owner = "core"
surface = "docs"
classification = "production"
reason = "Architecture Decision Records."
covered_by = ["python scripts/validate_adr.py"]

[[allow]]
glob = "docs/**/*.json"
kind = "doc_data"
owner = "core"
surface = "docs"
classification = "production"
reason = "Inline doc data tables / examples."
covered_by = []

# Speculative future doc surfaces (svg/png/yaml/yml/toml/txt/html/csv/proto)
# are not currently present under docs/. They will be added as needed; the
# policy intentionally does not pre-allowlist filetypes that have no
# matching files today, to keep the unused-entries report meaningful.

# --- Schemas / protocols / fixtures ----------------------------------------

[[allow]]
glob = "**/schemas/**/*.json"
kind = "json_schema"
owner = "schemas"
surface = "schema"
classification = "production"
reason = "JSON Schemas validated by jsonschema."
covered_by = ["cargo test --workspace"]

[[allow]]
glob = "**/fixtures/**"
kind = "fixture_input"
owner = "core"
surface = "fixtures"
classification = "test"
reason = "Test fixtures intentionally contain analyzed inputs (binary, JSON, YAML, CSV, captures, etc.)."
covered_by = ["cargo test --workspace"]

[[allow]]
glob = "**/*.snap"
kind = "insta_snapshot"
owner = "core"
surface = "fixtures"
classification = "test"
reason = "insta snapshot fixtures committed alongside tests."
covered_by = ["cargo test --workspace"]

# `**/*.snap.new` (pending insta snapshots) and `**/testdata/**` are
# intentionally NOT pre-allowlisted: they are expected to be empty in a
# clean tree, and adding them would suppress drift signal if they appear.

# --- Build / packaging ------------------------------------------------------

[[allow]]
glob = "build/**"
kind = "build_artifact"
owner = "release/ci"
surface = "tooling"
classification = "tooling"
reason = "Build helper scripts and shared build configuration."
covered_by = ["cargo build --workspace"]

[[allow]]
glob = "packaging/**"
