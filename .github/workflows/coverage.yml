name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'coverage') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: coverage-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-

      - name: Generate coverage report
        env:
          OPENRACING_SKIP_TIMING_GUARANTEES: "1"
          OPENRACING_USE_VIRTUAL_DEVICES: "1"
        run: |
          cargo llvm-cov --workspace \
            --all-features \
            --exclude racing-wheel-ui \
            --exclude racing-wheel-integration-tests \
            --ignore-filename-regex '(\.pb\.rs$|/tests/|/benches/|/fuzz/|/build\.rs$|_test\.rs$|/target/|yaml_sync_check\.rs$|validate_adr\.rs$|generate_docs_index\.rs$)' \
            --codecov \
            --output-path codecov.json

      - name: Generate coverage summary
        env:
          OPENRACING_SKIP_TIMING_GUARANTEES: "1"
          OPENRACING_USE_VIRTUAL_DEVICES: "1"
        run: |
          cargo llvm-cov --workspace \
            --all-features \
            --exclude racing-wheel-ui \
            --exclude racing-wheel-integration-tests \
            --ignore-filename-regex '(\.pb\.rs$|/tests/|/benches/|/fuzz/|/build\.rs$|_test\.rs$|/target/|yaml_sync_check\.rs$|validate_adr\.rs$|generate_docs_index\.rs$)' \
            --text \
            --output-path coverage-summary.txt
          echo "### Code Coverage Summary" > coverage-report.md
          echo '```' >> coverage-report.md
          tail -20 coverage-summary.txt >> coverage-report.md
          echo '```' >> coverage-report.md

      - name: Detect Codecov token
        id: codecov-token
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "${CODECOV_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "✓ CODECOV_TOKEN detected (length: ${#CODECOV_TOKEN})"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "⚠ CODECOV_TOKEN not configured. Set repository secret to enable Codecov uploads."
          fi

      - name: Upload coverage to Codecov (main)
        if: ${{ always() && github.event_name == 'push' && hashFiles('codecov.json') != '' && steps.codecov-token.outputs.present == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          flags: rust-core
          name: openracing-rust-core
          fail_ci_if_error: true

      - name: Upload coverage to Codecov (advisory)
        if: ${{ always() && github.event_name != 'push' && hashFiles('codecov.json') != '' && steps.codecov-token.outputs.present == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          flags: rust-core
          name: openracing-rust-core
          fail_ci_if_error: false

      - name: Notice Codecov token missing
        if: ${{ always() && steps.codecov-token.outputs.present == 'false' }}
        run: |
          echo "⚠️  Codecov token not configured"
          echo "Codecov uploads are skipped, but coverage artifacts are preserved."
          echo "To enable Codecov uploads, set the CODECOV_TOKEN repository secret."

      - name: Write coverage receipt
        if: always()
        run: |
          mkdir -p target/coverage
          python3 - <<'PY'
          import json
          import pathlib
          receipt = {
              "schema_version": 1,
              "repo": "OpenRacing",
              "lane": "coverage",
              "tool": "cargo-llvm-cov",
              "flag": "rust-core",
              "workflow": "Code Coverage",
              "artifacts": {
                  "codecov_json": pathlib.Path("codecov.json").exists(),
                  "coverage_summary": pathlib.Path("coverage-summary.txt").exists(),
              },
              "claim_boundary": [
                  "execution_surface_only",
                  "not_realtime_deadline_proof",
                  "not_hardware_correctness",
                  "not_simulator_adapter_correctness",
                  "not_force_feedback_safety",
                  "not_hil_readiness",
                  "not_bdd_completeness",
                  "not_fuzz_robustness",
                  "not_release_readiness"
              ],
          }
          pathlib.Path("target/coverage/coverage-receipt.json").write_text(
              json.dumps(receipt, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Summarize coverage artifacts
        if: always()
        run: |
          {
            echo "## Coverage"
            echo ""
            echo "| Artifact | Present |"
            echo "| --- | ---: |"
            echo "| codecov.json | $([ -s codecov.json ] && echo yes || echo no) |"
            echo "| coverage-summary.txt | $([ -s coverage-summary.txt ] && echo yes || echo no) |"
            echo "| coverage-receipt.json | $([ -s target/coverage/coverage-receipt.json ] && echo yes || echo no) |"
            echo ""
            echo "Codecov flag: \`rust-core\`"
            echo "Claim boundary: execution-surface evidence only."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            codecov.json
            coverage-summary.txt
            target/coverage/coverage-receipt.json
          retention-days: 30
