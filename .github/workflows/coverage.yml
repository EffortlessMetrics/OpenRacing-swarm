name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'coverage') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: coverage-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-

      - name: Generate coverage report
        env:
          OPENRACING_SKIP_TIMING_GUARANTEES: "1"
          OPENRACING_USE_VIRTUAL_DEVICES: "1"
        run: |
          cargo llvm-cov --workspace \
            --all-features \
            --exclude racing-wheel-ui \
            --exclude racing-wheel-integration-tests \
            --ignore-filename-regex '(\.pb\.rs$|/tests/|/benches/|/fuzz/|/build\.rs$|_test\.rs$|/target/|yaml_sync_check\.rs$|validate_adr\.rs$|generate_docs_index\.rs$)' \
            --codecov \
            --output-path codecov.json

      - name: Generate coverage summary
        env:
          OPENRACING_SKIP_TIMING_GUARANTEES: "1"
          OPENRACING_USE_VIRTUAL_DEVICES: "1"
        run: |
          cargo llvm-cov --workspace \
            --all-features \
            --exclude racing-wheel-ui \
            --exclude racing-wheel-integration-tests \
            --ignore-filename-regex '(\.pb\.rs$|/tests/|/benches/|/fuzz/|/build\.rs$|_test\.rs$|/target/|yaml_sync_check\.rs$|validate_adr\.rs$|generate_docs_index\.rs$)' \
            --text \
            --output-path coverage-summary.txt
          echo "### Code Coverage Summary" > coverage-report.md
          echo '```' >> coverage-report.md
          tail -20 coverage-summary.txt >> coverage-report.md
          echo '```' >> coverage-report.md

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            codecov.json
            coverage-summary.txt
          retention-days: 30
