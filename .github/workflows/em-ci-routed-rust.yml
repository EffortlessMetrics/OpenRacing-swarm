name: EM CI Routed Rust

on:
  workflow_dispatch:
    inputs:
      force_target:
        description: Force a route target for fallback proof.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - cx43
          - cx33
          - cx53
          - github
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions:
  contents: read

concurrency:
  group: openracing-rust-small-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  RUST_VERSION: "1.95.0"

jobs:
  route-rust-small:
    name: Route OpenRacing Rust Small
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target: ${{ steps.route.outputs.target }}
      reason: ${{ steps.route.outputs.reason }}
      error: ${{ steps.route.outputs.error }}
      trusted_self_hosted: ${{ steps.route.outputs.trusted_self_hosted }}
    steps:
      - name: Decide target runner
        id: route
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
          ORG: EffortlessMetrics
          FORCE_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.force_target || 'auto' }}
          TRUSTED_SELF_HOSTED: >-
            ${{
              github.event_name == 'workflow_dispatch' ||
              github.event_name == 'merge_group' ||
              (
                github.event_name == 'pull_request' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            }}
        shell: bash
        run: |
          set -eu

          emit() {
            local target="$1" reason="$2" error="$3" trusted="$4"
            echo "router_target=${target}"
            echo "router_reason=${reason}"
            echo "router_error=${error}"
            echo "trusted_self_hosted=${trusted}"
            {
              echo "target=${target}"
              echo "reason=${reason}"
              echo "error=${error}"
              echo "trusted_self_hosted=${trusted}"
            } >> "$GITHUB_OUTPUT"
            {
              echo "### OpenRacing Rust Small Route"
              echo ""
              echo "- router_target: \`${target}\`"
              echo "- router_reason: \`${reason}\`"
              echo "- router_error: \`${error}\`"
              echo "- trusted_self_hosted: \`${trusted}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          trusted="${TRUSTED_SELF_HOSTED:-false}"

          case "${FORCE_TARGET:-auto}" in
            auto|"")
              ;;
            github)
              emit "github" "forced_github" "false" "$trusted"
              exit 0
              ;;
            cx43|cx33|cx53)
              if [ "$trusted" != "true" ]; then
                emit "github" "forced_self_hosted_untrusted_event" "true" "$trusted"
                exit 0
              fi
              emit "$FORCE_TARGET" "forced_${FORCE_TARGET}" "false" "$trusted"
              exit 0
              ;;
            *)
              emit "github" "invalid_force_target" "true" "$trusted"
              exit 0
              ;;
          esac

          if [ "$trusted" != "true" ]; then
            emit "github" "untrusted_or_fork_pr" "false" "$trusted"
            exit 0
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            emit "github" "runner_token_missing" "true" "$trusted"
            exit 0
          fi

          if ! runners_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "orgs/${ORG}/actions/runners?per_page=100" 2>/tmp/gh.err)"; then
            echo "runner API request failed:" >&2
            cat /tmp/gh.err >&2 || true
            emit "github" "runner_api_failed" "true" "$trusted"
            exit 0
          fi

          if ! RUNNERS_JSON="${runners_json}" python - <<'PY' > runner-counts.env
          import json
          import os

          data = json.loads(os.environ["RUNNERS_JSON"])

          def idle_count(host_label):
              count = 0
              required = {"em-ci", host_label, "rust-small", "trusted-pr"}
              for runner in data.get("runners", []):
                  labels = {label.get("name") for label in runner.get("labels", [])}
                  if (
                      runner.get("status") == "online"
                      and not runner.get("busy", True)
                      and required.issubset(labels)
                  ):
                      count += 1
              return count

          for label in ("cx43", "cx33", "cx53"):
              print(f"idle_{label}={idle_count(label)}")
          PY
          then
            emit "github" "runner_parse_failed" "true" "$trusted"
            exit 0
          fi

          . ./runner-counts.env

          echo "idle_cx43=${idle_cx43:-0}"
          echo "idle_cx33=${idle_cx33:-0}"
          echo "idle_cx53=${idle_cx53:-0}"

          if [ "${idle_cx43:-0}" -gt 0 ]; then
            emit "cx43" "cx43_idle" "false" "$trusted"
          elif [ "${idle_cx33:-0}" -gt 0 ]; then
            emit "cx33" "cx33_idle" "false" "$trusted"
          elif [ "${idle_cx53:-0}" -gt 0 ]; then
            emit "cx53" "cx53_idle" "false" "$trusted"
          else
            emit "github" "no_idle_runner" "false" "$trusted"
          fi

  rust-small-cx43:
    name: OpenRacing Rust Small on CX43
    needs: route-rust-small
    if: >-
      needs.route-rust-small.outputs.target == 'cx43' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx43, rust-small, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 30G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_BUILD_JOBS: "4"
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 100
          ci-disk-guard /mnt/docker 20
          ci-disk-guard /mnt/ci-cache 20

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Run OpenRacing Rust small on CX43
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="6" \
            --memory="12g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="$SCCACHE_CACHE_SIZE" \
            -e RUSTC_WRAPPER="$RUSTC_WRAPPER" \
            -e CARGO_INCREMENTAL="$CARGO_INCREMENTAL" \
            -e CARGO_BUILD_JOBS="$CARGO_BUILD_JOBS" \
            -e CARGO_TARGET_DIR=/target \
            -e RUST_BACKTRACE="$RUST_BACKTRACE" \
            -e CARGO_TERM_COLOR=always \
            -e TMPDIR=/tmp/jobtmp \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$CARGO_HOME:/cargo-home" \
            -v "$SCCACHE_DIR:/sccache" \
            -v "$CARGO_TARGET_DIR:/target" \
            -v "$TMPDIR:/tmp/jobtmp" \
            -w /workspace \
            "$IMAGE" \
            bash -eu -o pipefail -c '
              git config --global --add safe.directory /workspace
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libudev-dev pkg-config
              rustc --version
              cargo --version
              sccache --version || true
              cargo fetch --locked
              cargo check --workspace --exclude racing-wheel-ui --locked
              cargo test --workspace --exclude racing-wheel-ui --locked --lib
              sccache --show-stats || true
            '

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set +e
          docker run --rm \
            -v "$TMPDIR:/tmpdir" \
            -v "$CARGO_TARGET_DIR:/target" \
            "$IMAGE" \
            bash -c 'rm -rf /tmpdir/* /tmpdir/.[!.]* /tmpdir/..?* /target/* /target/.[!.]* /target/..?* 2>/dev/null || true' || true
          rmdir "$TMPDIR" "$CARGO_TARGET_DIR" 2>/dev/null || true

  rust-small-cx33:
    name: OpenRacing Rust Small on CX33
    needs: route-rust-small
    if: >-
      needs.route-rust-small.outputs.target == 'cx33' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx33, rust-small, trusted-pr]
    timeout-minutes: 150
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 20G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_BUILD_JOBS: "3"
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 80
          ci-disk-guard /mnt/docker 15
          ci-disk-guard /mnt/ci-cache 15

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Run OpenRacing Rust small on CX33
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="4" \
            --memory="8g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="$SCCACHE_CACHE_SIZE" \
            -e RUSTC_WRAPPER="$RUSTC_WRAPPER" \
            -e CARGO_INCREMENTAL="$CARGO_INCREMENTAL" \
            -e CARGO_BUILD_JOBS="$CARGO_BUILD_JOBS" \
            -e CARGO_TARGET_DIR=/target \
            -e RUST_BACKTRACE="$RUST_BACKTRACE" \
            -e CARGO_TERM_COLOR=always \
            -e TMPDIR=/tmp/jobtmp \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$CARGO_HOME:/cargo-home" \
            -v "$SCCACHE_DIR:/sccache" \
            -v "$CARGO_TARGET_DIR:/target" \
            -v "$TMPDIR:/tmp/jobtmp" \
            -w /workspace \
            "$IMAGE" \
            bash -eu -o pipefail -c '
              git config --global --add safe.directory /workspace
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libudev-dev pkg-config
              rustc --version
              cargo --version
              sccache --version || true
              cargo fetch --locked
              cargo check --workspace --exclude racing-wheel-ui --locked
              cargo test --workspace --exclude racing-wheel-ui --locked --lib
              sccache --show-stats || true
            '

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set +e
          docker run --rm \
            -v "$TMPDIR:/tmpdir" \
            -v "$CARGO_TARGET_DIR:/target" \
            "$IMAGE" \
            bash -c 'rm -rf /tmpdir/* /tmpdir/.[!.]* /tmpdir/..?* /target/* /target/.[!.]* /target/..?* 2>/dev/null || true' || true
          rmdir "$TMPDIR" "$CARGO_TARGET_DIR" 2>/dev/null || true

  rust-small-cx53:
    name: OpenRacing Rust Small on CX53
    needs: route-rust-small
    if: >-
      needs.route-rust-small.outputs.target == 'cx53' &&
      needs.route-rust-small.outputs.trusted_self_hosted == 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx53, rust-small, trusted-pr]
    timeout-minutes: 120
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 60G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_BUILD_JOBS: "12"
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 100
          ci-disk-guard /mnt/docker 20
          ci-disk-guard /mnt/ci-cache 20

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Run OpenRacing Rust small on CX53
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="14" \
            --memory="28g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="$SCCACHE_CACHE_SIZE" \
            -e RUSTC_WRAPPER="$RUSTC_WRAPPER" \
            -e CARGO_INCREMENTAL="$CARGO_INCREMENTAL" \
            -e CARGO_BUILD_JOBS="$CARGO_BUILD_JOBS" \
            -e CARGO_TARGET_DIR=/target \
            -e RUST_BACKTRACE="$RUST_BACKTRACE" \
            -e CARGO_TERM_COLOR=always \
            -e TMPDIR=/tmp/jobtmp \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$CARGO_HOME:/cargo-home" \
            -v "$SCCACHE_DIR:/sccache" \
            -v "$CARGO_TARGET_DIR:/target" \
            -v "$TMPDIR:/tmp/jobtmp" \
            -w /workspace \
            "$IMAGE" \
            bash -eu -o pipefail -c '
              git config --global --add safe.directory /workspace
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libudev-dev pkg-config
              rustc --version
              cargo --version
              sccache --version || true
              cargo fetch --locked
              cargo check --workspace --exclude racing-wheel-ui --locked
              cargo test --workspace --exclude racing-wheel-ui --locked --lib
              sccache --show-stats || true
            '

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set +e
          docker run --rm \
            -v "$TMPDIR:/tmpdir" \
            -v "$CARGO_TARGET_DIR:/target" \
            "$IMAGE" \
            bash -c 'rm -rf /tmpdir/* /tmpdir/.[!.]* /tmpdir/..?* /target/* /target/.[!.]* /target/..?* 2>/dev/null || true' || true
          rmdir "$TMPDIR" "$CARGO_TARGET_DIR" 2>/dev/null || true

  rust-small-github:
    name: OpenRacing Rust Small on GitHub Hosted
    needs: route-rust-small
    if: needs.route-rust-small.outputs.target == 'github'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Use larger writable target dir
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/target" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: ${{ runner.temp }}/target
          save-if: false

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Check workspace
        run: cargo check --workspace --exclude racing-wheel-ui --locked

      - name: Test workspace libs
        run: cargo test --workspace --exclude racing-wheel-ui --locked --lib

  rust-small-result:
    name: OpenRacing Rust Small Result
    needs:
      - route-rust-small
      - rust-small-cx43
      - rust-small-cx33
      - rust-small-cx53
      - rust-small-github
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate routed result
        shell: bash
        env:
          ROUTE_RESULT: ${{ needs.route-rust-small.result }}
          TARGET: ${{ needs.route-rust-small.outputs.target }}
          ROUTER_REASON: ${{ needs.route-rust-small.outputs.reason }}
          ROUTER_ERROR: ${{ needs.route-rust-small.outputs.error }}
          TRUSTED_SELF_HOSTED: ${{ needs.route-rust-small.outputs.trusted_self_hosted }}
          CX43_RESULT: ${{ needs.rust-small-cx43.result }}
          CX33_RESULT: ${{ needs.rust-small-cx33.result }}
          CX53_RESULT: ${{ needs.rust-small-cx53.result }}
          GITHUB_RESULT: ${{ needs.rust-small-github.result }}
        run: |
          set -eu

          echo "route_result=${ROUTE_RESULT:-<empty>}"
          echo "router_target=${TARGET:-<empty>}"
          echo "router_reason=${ROUTER_REASON:-<empty>}"
          echo "router_error=${ROUTER_ERROR:-<empty>}"
          echo "trusted_self_hosted=${TRUSTED_SELF_HOSTED:-<empty>}"
          echo "cx43_result=${CX43_RESULT:-<empty>}"
          echo "cx33_result=${CX33_RESULT:-<empty>}"
          echo "cx53_result=${CX53_RESULT:-<empty>}"
          echo "github_result=${GITHUB_RESULT:-<empty>}"

          {
            echo "### OpenRacing Rust Small Result"
            echo ""
            echo "- route_result: \`${ROUTE_RESULT:-<empty>}\`"
            echo "- router_target: \`${TARGET:-<empty>}\`"
            echo "- router_reason: \`${ROUTER_REASON:-<empty>}\`"
            echo "- router_error: \`${ROUTER_ERROR:-<empty>}\`"
            echo "- trusted_self_hosted: \`${TRUSTED_SELF_HOSTED:-<empty>}\`"
            echo "- cx43_result: \`${CX43_RESULT:-<empty>}\`"
            echo "- cx33_result: \`${CX33_RESULT:-<empty>}\`"
            echo "- cx53_result: \`${CX53_RESULT:-<empty>}\`"
            echo "- github_result: \`${GITHUB_RESULT:-<empty>}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$ROUTE_RESULT" != "success" ]; then
            echo "router job did not succeed; failing normalized result" >&2
            exit 1
          fi

          case "${TARGET:-}" in
            cx43)
              test "$CX43_RESULT" = "success"
              test "$CX33_RESULT" = "skipped"
              test "$CX53_RESULT" = "skipped"
              test "$GITHUB_RESULT" = "skipped"
              ;;
            cx33)
              test "$CX33_RESULT" = "success"
              test "$CX43_RESULT" = "skipped"
              test "$CX53_RESULT" = "skipped"
              test "$GITHUB_RESULT" = "skipped"
              ;;
            cx53)
              test "$CX53_RESULT" = "success"
              test "$CX43_RESULT" = "skipped"
              test "$CX33_RESULT" = "skipped"
              test "$GITHUB_RESULT" = "skipped"
              ;;
            github)
              test "$GITHUB_RESULT" = "success"
              test "$CX43_RESULT" = "skipped"
              test "$CX33_RESULT" = "skipped"
              test "$CX53_RESULT" = "skipped"
              ;;
            *)
              echo "router produced unknown target: ${TARGET:-<empty>}" >&2
              exit 1
              ;;
          esac

          echo "OpenRacing Rust Small Result: success"
