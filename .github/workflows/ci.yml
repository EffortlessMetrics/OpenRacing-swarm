name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  pr-change-filter:
    name: PR Change Filter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ci_paths: ${{ steps.filter.outputs.ci_paths }}
      dependency_paths: ${{ steps.filter.outputs.dependency_paths }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      moza_paths: ${{ steps.filter.outputs.moza_paths }}
      perf_paths: ${{ steps.filter.outputs.perf_paths }}
      schema_paths: ${{ steps.filter.outputs.schema_paths }}
      ui_paths: ${{ steps.filter.outputs.ui_paths }}
      workspace_paths: ${{ steps.filter.outputs.workspace_paths }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed paths
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            {
              echo "ci_paths=true"
              echo "dependency_paths=true"
              echo "docs_only=false"
              echo "moza_paths=true"
              echo "perf_paths=true"
              echo "schema_paths=true"
              echo "ui_paths=true"
              echo "workspace_paths=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          mapfile -t changed < <(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)

          if [ "${#changed[@]}" -eq 0 ]; then
            docs_only=false
          elif printf '%s\n' "${changed[@]}" | grep -Ev '^(docs/|README\.md$|CHANGELOG\.md$|AGENTS\.md$|\.github/ISSUE_TEMPLATE/|\.github/pull_request_template\.md$)' >/dev/null; then
            docs_only=false
          else
            docs_only=true
          fi

          match_any() {
            local pattern="$1"
            printf '%s\n' "${changed[@]}" | grep -E "$pattern" >/dev/null
          }

          ci_paths=false
          dependency_paths=false
          moza_paths=false
          perf_paths=false
          schema_paths=false
          ui_paths=false
          workspace_paths=false

          if match_any '^(\.github/workflows/|\.github/actions/|scripts/|policy/|deny\.toml$)'; then
            ci_paths=true
          fi
          if match_any '(^Cargo\.toml$|^Cargo\.lock$|^deny\.toml$|^workspace-hack/|/Cargo\.toml$)'; then
            dependency_paths=true
          fi
          if match_any '^(crates/(cli/src/commands/moza\.rs|moza-wheelbase-report/|hid-moza-protocol/|hid-capture/|openracing-hardware-core/|openracing-hid-common/)|docs/hardware/|ci/hardware/|schemas/.+moza)'; then
            moza_paths=true
          fi
          if match_any '^(crates/engine/|crates/integration-tests/|benches/|scripts/validate_performance\.py|docs/ci/timing-gates\.md)'; then
            perf_paths=true
          fi
          if match_any '^(schemas/|crates/schemas/|proto/|.+\.proto$|.+\.schema\.json$)'; then
            schema_paths=true
          fi
          if match_any '^(crates/ui/|package\.json$|package-lock\.json$|pnpm-lock\.yaml$|yarn\.lock$)'; then
            ui_paths=true
          fi

          is_docs_path() {
            [[ "$1" =~ ^(docs/|README\.md$|CHANGELOG\.md$|AGENTS\.md$|\.github/ISSUE_TEMPLATE/|\.github/pull_request_template\.md$) ]]
          }
          is_moza_path() {
            [[ "$1" =~ ^(crates/(cli/src/commands/moza\.rs|moza-wheelbase-report/|hid-moza-protocol/|hid-capture/|openracing-hardware-core/|openracing-hid-common/)|docs/hardware/|ci/hardware/|schemas/.+moza) ]]
          }
          is_ui_path() {
            [[ "$1" =~ ^(crates/ui/|package\.json$|package-lock\.json$|pnpm-lock\.yaml$|yarn\.lock$) ]]
          }
          is_dependency_path() {
            [[ "$1" =~ (^Cargo\.toml$|^Cargo\.lock$|^deny\.toml$|^workspace-hack/|/Cargo\.toml$) ]]
          }
          is_ci_path() {
            [[ "$1" =~ ^(\.github/workflows/|\.github/actions/|scripts/|policy/|deny\.toml$) ]]
          }
          is_perf_path() {
            [[ "$1" =~ ^(crates/engine/|crates/integration-tests/|benches/|scripts/validate_performance\.py|docs/ci/timing-gates\.md) ]]
          }
          is_schema_path() {
            [[ "$1" =~ ^(schemas/|crates/schemas/|proto/|.+\.proto$|.+\.schema\.json$) ]]
          }

          for path in "${changed[@]}"; do
            if is_docs_path "$path" || is_moza_path "$path" || is_ui_path "$path"; then
              continue
            fi
            if is_dependency_path "$path" || is_ci_path "$path" || is_perf_path "$path" || is_schema_path "$path"; then
              workspace_paths=true
              continue
            fi
            workspace_paths=true
          done

          {
            echo "ci_paths=$ci_paths"
            echo "dependency_paths=$dependency_paths"
            echo "docs_only=$docs_only"
            echo "moza_paths=$moza_paths"
            echo "perf_paths=$perf_paths"
            echo "schema_paths=$schema_paths"
            echo "ui_paths=$ui_paths"
            echo "workspace_paths=$workspace_paths"
          } >> "$GITHUB_OUTPUT"

      - name: Smoke-test path classifier patterns
        shell: bash
        run: |
          set -euo pipefail

          classify_fixture() {
            local docs_only ci_paths dependency_paths moza_paths perf_paths schema_paths ui_paths workspace_paths
            local changed=("$@")

            if [ "${#changed[@]}" -eq 0 ]; then
              docs_only=false
            elif printf '%s\n' "${changed[@]}" | grep -Ev '^(docs/|README\.md$|CHANGELOG\.md$|AGENTS\.md$|\.github/ISSUE_TEMPLATE/|\.github/pull_request_template\.md$)' >/dev/null; then
              docs_only=false
            else
              docs_only=true
            fi

            match_fixture() {
              local pattern="$1"
              printf '%s\n' "${changed[@]}" | grep -E "$pattern" >/dev/null
            }

            ci_paths=false
            dependency_paths=false
            moza_paths=false
            perf_paths=false
            schema_paths=false
            ui_paths=false
            workspace_paths=false

            if match_fixture '^(\.github/workflows/|\.github/actions/|scripts/|policy/|deny\.toml$)'; then
              ci_paths=true
            fi
            if match_fixture '(^Cargo\.toml$|^Cargo\.lock$|^deny\.toml$|^workspace-hack/|/Cargo\.toml$)'; then
              dependency_paths=true
            fi
            if match_fixture '^(crates/(cli/src/commands/moza\.rs|moza-wheelbase-report/|hid-moza-protocol/|hid-capture/|openracing-hardware-core/|openracing-hid-common/)|docs/hardware/|ci/hardware/|schemas/.+moza)'; then
              moza_paths=true
            fi
            if match_fixture '^(crates/engine/|crates/integration-tests/|benches/|scripts/validate_performance\.py|docs/ci/timing-gates\.md)'; then
              perf_paths=true
            fi
            if match_fixture '^(schemas/|crates/schemas/|proto/|.+\.proto$|.+\.schema\.json$)'; then
              schema_paths=true
            fi
            if match_fixture '^(crates/ui/|package\.json$|package-lock\.json$|pnpm-lock\.yaml$|yarn\.lock$)'; then
              ui_paths=true
            fi

            is_docs_fixture() {
              [[ "$1" =~ ^(docs/|README\.md$|CHANGELOG\.md$|AGENTS\.md$|\.github/ISSUE_TEMPLATE/|\.github/pull_request_template\.md$) ]]
            }
            is_moza_fixture() {
              [[ "$1" =~ ^(crates/(cli/src/commands/moza\.rs|moza-wheelbase-report/|hid-moza-protocol/|hid-capture/|openracing-hardware-core/|openracing-hid-common/)|docs/hardware/|ci/hardware/|schemas/.+moza) ]]
            }
            is_ui_fixture() {
              [[ "$1" =~ ^(crates/ui/|package\.json$|package-lock\.json$|pnpm-lock\.yaml$|yarn\.lock$) ]]
            }
            is_dependency_fixture() {
              [[ "$1" =~ (^Cargo\.toml$|^Cargo\.lock$|^deny\.toml$|^workspace-hack/|/Cargo\.toml$) ]]
            }
            is_ci_fixture() {
              [[ "$1" =~ ^(\.github/workflows/|\.github/actions/|scripts/|policy/|deny\.toml$) ]]
            }
            is_perf_fixture() {
              [[ "$1" =~ ^(crates/engine/|crates/integration-tests/|benches/|scripts/validate_performance\.py|docs/ci/timing-gates\.md) ]]
            }
            is_schema_fixture() {
              [[ "$1" =~ ^(schemas/|crates/schemas/|proto/|.+\.proto$|.+\.schema\.json$) ]]
            }

            for path in "${changed[@]}"; do
              if is_docs_fixture "$path" || is_moza_fixture "$path" || is_ui_fixture "$path"; then
                continue
              fi
              if is_dependency_fixture "$path" || is_ci_fixture "$path" || is_perf_fixture "$path" || is_schema_fixture "$path"; then
                workspace_paths=true
                continue
              fi
              workspace_paths=true
            done

            printf 'docs_only=%s ci_paths=%s dependency_paths=%s moza_paths=%s perf_paths=%s schema_paths=%s ui_paths=%s workspace_paths=%s\n' \
              "$docs_only" "$ci_paths" "$dependency_paths" "$moza_paths" "$perf_paths" "$schema_paths" "$ui_paths" "$workspace_paths"
          }

          assert_classifier() {
            local label="$1"
            local expected="$2"
            shift 2

            local actual
            actual="$(classify_fixture "$@")"
            if [ "$actual" != "$expected" ]; then
              echo "::error::Classifier fixture '$label' failed"
              echo "expected: $expected"
              echo "actual:   $actual"
              exit 1
            fi
          }

          assert_classifier "docs-only" \
            "docs_only=true ci_paths=false dependency_paths=false moza_paths=true perf_paths=false schema_paths=false ui_paths=false workspace_paths=false" \
            docs/hardware/moza-r5-live-testing-roadmap.md README.md

          assert_classifier "moza-parser" \
            "docs_only=false ci_paths=false dependency_paths=false moza_paths=true perf_paths=false schema_paths=false ui_paths=false workspace_paths=false" \
            crates/moza-wheelbase-report/src/lib.rs

          assert_classifier "hardware-receipt" \
            "docs_only=false ci_paths=false dependency_paths=false moza_paths=true perf_paths=false schema_paths=false ui_paths=false workspace_paths=false" \
            ci/hardware/moza-r5/2026-05-13/manifest.json

          assert_classifier "dependency" \
            "docs_only=false ci_paths=false dependency_paths=true moza_paths=false perf_paths=false schema_paths=false ui_paths=false workspace_paths=true" \
            Cargo.lock

          assert_classifier "ui" \
            "docs_only=false ci_paths=false dependency_paths=false moza_paths=false perf_paths=false schema_paths=false ui_paths=true workspace_paths=false" \
            crates/ui/src/lib.rs

          assert_classifier "ci-workflow" \
            "docs_only=false ci_paths=true dependency_paths=false moza_paths=false perf_paths=false schema_paths=false ui_paths=false workspace_paths=true" \
            .github/workflows/ci.yml

          assert_classifier "perf" \
            "docs_only=false ci_paths=false dependency_paths=false moza_paths=false perf_paths=true schema_paths=false ui_paths=false workspace_paths=true" \
            crates/engine/src/lib.rs

          assert_classifier "schema" \
            "docs_only=false ci_paths=false dependency_paths=false moza_paths=false perf_paths=false schema_paths=true ui_paths=false workspace_paths=true" \
            crates/schemas/src/lib.rs

  # Phase 0: Documentation and format validation (fast, no build required)
  changelog-validation:
    name: CHANGELOG Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate CHANGELOG format
        run: |
          chmod +x scripts/validate_changelog.py
          python3 scripts/validate_changelog.py --verbose

  docs-policy-checks:
    name: Docs & Policy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate non-Rust file policy
        run: python scripts/policy_file.py

      - name: Check whitespace-sensitive diffs
        run: git diff --check

  # Phase 0b: MSRV (Minimum Supported Rust Version) check
  msrv-check:
    name: MSRV Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.workspace_paths == 'true' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      needs.pr-change-filter.outputs.perf_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Verify MSRV compilation
        run: cargo check --workspace --all-features --exclude racing-wheel-ui --locked

  # Phase 1: Fast isolation builds (run in parallel for quick feedback)
  isolation-cli:
    name: CLI Isolation Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.workspace_paths == 'true' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      needs.pr-change-filter.outputs.perf_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - &sccache_best_effort
        name: Configure sccache (best effort)
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v sccache >/dev/null 2>&1; then
            echo "sccache not found; continuing without cache"
            exit 0
          fi

          # Clean slate (avoid stale config from previous attempts)
          sccache --stop-server || true

          # Try GH Actions Cache backend first.
          if SCCACHE_GHA_ENABLED=true sccache --start-server; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            sccache --show-stats || true
            exit 0
          fi

          echo "GH Actions Cache backend unavailable; falling back to local disk cache."
          sccache --stop-server || true

          # Fall back to local cache (no GHAC dependency)
          if SCCACHE_GHA_ENABLED=false sccache --start-server; then
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
            sccache --show-stats || true
            exit 0
          fi

          # Absolute last resort: keep the job running, even if sccache is busted.
          echo "sccache failed to start; disabling caching."
          echo "SCCACHE_DISABLE=1" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Build CLI in isolation
        run: cargo build -p wheelctl --locked

      - name: Test CLI help (smoke test)
        run: cargo run -p wheelctl --bin wheelctl --locked -- --help

  isolation-service:
    name: Service Isolation Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.workspace_paths == 'true' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      needs.pr-change-filter.outputs.perf_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Build Service in isolation
        run: cargo build -p racing-wheel-service --locked

      - name: Test Service help (smoke test)
        run: cargo run -p racing-wheel-service --bin wheeld --locked -- --help

  isolation-plugins:
    name: Plugins Isolation Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.workspace_paths == 'true' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      needs.pr-change-filter.outputs.perf_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Build Plugins in isolation
        run: cargo build -p racing-wheel-plugins --locked

      - name: Build sample plugin (feature gated)
        run: cargo build -p racing-wheel-plugins --features sample-plugins --locked

  # UI crate build verification on Ubuntu 22.04 and 24.04
  # Tests webkit2gtk-4.1 compatibility across supported Ubuntu LTS versions
  isolation-ui:
    name: UI Isolation Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.ui_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'ui') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Install webkit2gtk-4.1 and related dependencies for Tauri 2.x
          # Ubuntu 22.04 provides webkit2gtk 2.38.x (minimum supported)
          # Ubuntu 24.04 provides webkit2gtk 2.44.x (recommended)
          sudo apt-get install -y \
            libudev-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Verify webkit2gtk version (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Checking webkit2gtk-4.1 version..."
          pkg-config --modversion webkit2gtk-4.1
          echo "webkit2gtk-4.1 is available and meets Tauri 2.x requirements"

      - name: Build UI in isolation
        run: cargo build -p racing-wheel-ui --locked

      - name: Verify UI crate compiles with release profile
        run: cargo build -p racing-wheel-ui --release --locked

  # Targeted platform smoke. These jobs are intentionally not part of the
  # normal Linux correctness chain; they run when OS-specific paths or labels
  # indicate the PR needs hosted Windows/macOS compatibility coverage.
  platform-change-filter:
    name: Platform Change Filter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      windows: ${{ steps.changes.outputs.windows }}
      macos: ${{ steps.changes.outputs.macos }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect platform-specific path changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          else
            changed_files=$(git diff --name-only HEAD~1 HEAD || true)
          fi

          windows=false
          macos=false

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              .github/workflows/*windows*|.github/workflows/ci.yml|.github/workflows/platform-confidence.yml|\
              crates/service/src/*game*|crates/service/src/config*|crates/hid*/src/windows*|\
              crates/ui/**|crates/plugins/**|Cargo.lock)
                windows=true
                ;;
            esac

            case "$path" in
              .github/workflows/*mac*|.github/workflows/ci.yml|.github/workflows/platform-confidence.yml|\
              crates/ui/**|crates/hid*/src/macos*|crates/plugins/**|Cargo.lock)
                macos=true
                ;;
            esac
          done <<< "$changed_files"

          echo "windows=$windows" >> "$GITHUB_OUTPUT"
          echo "macos=$macos" >> "$GITHUB_OUTPUT"

          {
            echo "Changed files:"
            printf '%s\n' "$changed_files"
            echo "windows=$windows"
            echo "macos=$macos"
          } >> "$GITHUB_STEP_SUMMARY"

  windows-smoke:
    name: Windows Smoke
    runs-on: windows-latest
    timeout-minutes: 20
    needs: [platform-change-filter]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.platform-change-filter.outputs.windows == 'true' ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'windows') ||
         contains(github.event.pull_request.labels.*.name, 'platform')))

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Windows-facing binaries
        run: |
          cargo check -p wheelctl --locked
          cargo check -p racing-wheel-service --locked

      - name: Run Windows game-root error smoke
        run: cargo test -p racing-wheel-service game_integration_e2e_tests::tests::test_error_handling --locked

  macos-smoke:
    name: macOS Smoke
    runs-on: macos-latest
    timeout-minutes: 20
    needs: [platform-change-filter]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.platform-change-filter.outputs.macos == 'true' ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'macos') ||
         contains(github.event.pull_request.labels.*.name, 'platform')))

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check macOS-facing binaries
        run: |
          cargo check -p wheelctl --locked
          cargo check -p racing-wheel-service --locked

  # Phase 2: Schema validation and trybuild guards
  schemas-validation:
    name: Schemas & Trybuild
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.schema_paths == 'true' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for buf breaking change detection

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc
        uses: arduino/setup-protoc@v2
        with:
          version: "23.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Build schemas crate
        run: cargo build -p racing-wheel-schemas --locked

      - name: Run trybuild compile-fail guards
        run: cargo test -p racing-wheel-schemas --test trybuild_guards --locked

      - name: Run buf breaking change detection
        run: |
          cd crates/schemas
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            buf breaking --against '../../.git#branch=origin/main,subdir=crates/schemas'
          else
            echo "Skipping breaking change detection on main branch"
          fi

      - name: Run JSON schema round-trip tests
        run: cargo test -p racing-wheel-schemas schema_roundtrip --locked

      - name: Verify buf workspace builds
        run: |
          cd crates/schemas
          # CI validates schema syntax/consistency only.
          # We intentionally avoid `buf generate` here because plugin resolution
          # is auth/environment-dependent in hosted runners.
          buf build

  moza-focused-checks:
    name: Moza Focused Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      (needs.pr-change-filter.outputs.moza_paths == 'true' &&
        needs.pr-change-filter.outputs.docs_only != 'true') ||
      contains(github.event.pull_request.labels.*.name, 'moza') ||
      contains(github.event.pull_request.labels.*.name, 'hardware') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config python3

      - name: Run focused Moza parser and verifier tests
        run: |
          cargo test -p racing-wheel-moza-wheelbase-report --locked
          cargo test -p racing-wheel-hid-moza-protocol --locked
          cargo test -p wheelctl --bin wheelctl moza --locked

      - name: Run focused Moza clippy
        run: |
          cargo clippy \
            -p racing-wheel-moza-wheelbase-report \
            -p racing-wheel-hid-moza-protocol \
            -p wheelctl \
            --all-targets --all-features --locked -- -D warnings

  # Phase 3: Workspace default build
  workspace-default:
    name: Workspace Default Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest]
    needs: [pr-change-filter]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.workspace_paths == 'true' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      needs.pr-change-filter.outputs.perf_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          # Remove pre-installed software to free disk for full workspace build
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/share/swift \
            /usr/local/share/boost /usr/share/az_*
          sudo docker image prune --all --force || true
          df -h /

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            pkg-config

      - name: Build workspace with default features
        run: cargo build --workspace --exclude racing-wheel-ui --locked

      - name: Test workspace compilation
        run: cargo test --workspace --exclude racing-wheel-ui --no-run --locked

  # Phase 4: Feature combinations
  feature-combinations:
    name: Feature Combinations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [pr-change-filter, workspace-default]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'dependency') ||
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/share/swift \
            /usr/local/share/boost /usr/share/az_*
          sudo docker image prune --all --force || true
          df -h /

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            pkg-config

      - name: Build with all features
        run: cargo build --workspace --exclude racing-wheel-ui --all-features --locked

      - name: Build with no default features
        run: cargo build --workspace --exclude racing-wheel-ui --no-default-features --locked

      - name: Test all feature combinations compile
        run: cargo test --workspace --exclude racing-wheel-ui --all-features --no-run --locked

  # Phase 5: Dependency governance and minimal versions (nightly)
  dependency-governance:
    name: Dependency Governance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [pr-change-filter, workspace-default]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'dependency') ||
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install cargo-hakari
        run: cargo install cargo-hakari --locked

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for duplicate dependencies
        run: |
          DUPLICATES=$(cargo tree --duplicates)
          if [ -n "$DUPLICATES" ]; then
            echo "::warning::Duplicate dependencies found (informational; governed by deny.toml):"
            echo "$DUPLICATES"
          else
            echo "No duplicate dependencies found"
          fi

      - name: Verify cargo-hakari feature unification
        run: |
          cargo hakari generate
          if ! git diff --exit-code; then
            echo "cargo-hakari generated changes. Please run 'cargo hakari generate' and commit."
            exit 1
          fi

      - name: Check unused dependencies
        continue-on-error: true  # Known false-positives: see F-029 in FRICTION_LOG.md
        run: cargo +nightly udeps --workspace --all-targets --exclude workspace-hack

      - name: Test minimal versions (nightly)
        continue-on-error: true  # Known issues with minimal versions in large workspaces
        run: |
          cargo +nightly update -Z direct-minimal-versions
          cargo +nightly build --workspace --locked

  # Phase 6: Comprehensive lint gates and governance enforcement
  lint-gates:
    name: Comprehensive Lint Gates & Governance
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest]
    needs: [pr-change-filter, workspace-default]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      needs.pr-change-filter.outputs.perf_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'perf') ||
      contains(github.event.pull_request.labels.*.name, 'dependency') ||
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust nightly (for cargo-udeps)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config python3

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Python should already be available on Windows runners
          python --version

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Run comprehensive lint gates (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/lint_gates.py
          python3 scripts/lint_gates.py

      - name: Run comprehensive lint gates (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/lint_gates.ps1

      - name: Verify lint attributes in source files
        run: |
          echo "Verifying lint enforcement attributes in source files..."

          # Check that non-test crates have required lint attributes
          REQUIRED_LINTS=(
            "static_mut_refs"
            "unused_must_use"
            "clippy::unwrap_used"
          )

          NON_TEST_CRATES=(
            "crates/schemas/src/lib.rs"
            "crates/engine/src/lib.rs"
            "crates/service/src/lib.rs"
            "crates/ui/src/lib.rs"
            "crates/plugins/src/lib.rs"
            "crates/cli/src/main.rs"
          )

          for crate_file in "${NON_TEST_CRATES[@]}"; do
            if [ -f "$crate_file" ]; then
              echo "Checking lint attributes in: $crate_file"
              
              for lint in "${REQUIRED_LINTS[@]}"; do
                if ! grep -q "#!\[deny($lint)\]" "$crate_file"; then
                  echo "❌ Missing required lint attribute in $crate_file: #![deny($lint)]"
                  exit 1
                fi
              done
              
              echo "✅ All required lint attributes found in: $crate_file"
            else
              echo "⚠️ Crate file not found: $crate_file"
            fi
          done
        shell: bash

      - name: Additional governance checks
        run: |
          echo "Running additional governance enforcement checks..."

          # Check for print statements in non-test code (should use tracing instead)
          # Excludes: test dirs, integration tests, examples, benches, CLI, binaries,
          # build scripts, entrypoints, test helpers, plugin examples, and test modules.
          PRINT_HITS=$(find crates/ -name "*.rs" \
            -not -path "*/tests/*" \
            -not -path "*/integration-tests/*" \
            -not -path "*/examples/*" \
            -not -path "*/benches/*" \
            -not -path "*/cli/*" \
            -not -path "*/hid-capture/*" \
            -not -path "*/openracing-capture-ids/*" \
            -not -path "*/openracing-test-helpers/*" \
            -not -path "*/plugin-examples/*" \
            -not -name "build.rs" \
            -not -name "main.rs" \
            -not -name "*_tests.rs" \
            -not -name "tests.rs" \
            -not -name "allocation_tracker.rs" \
            -print0 \
          | xargs -0 grep -nE '(println!|print!|dbg!|eprintln!|eprint!)\s*\(' 2>/dev/null \
          | grep -vE ':[0-9]+:\s*//' || true)

          if [ -n "$PRINT_HITS" ]; then
            echo "❌ Print statements found in non-test code. Use tracing macros instead."
            echo "$PRINT_HITS"
            exit 1
          fi

          # Check for unwrap() usage in non-test code
          UNWRAP_VIOLATIONS=$(find crates/ -name "*.rs" \
            -not -path "*/test*" \
            -not -path "*/integration-tests/*" \
            -not -name "build.rs" \
            -not -path "*/examples/*" \
            -not -path "*/benches/*" \
            -not -name "*_tests.rs" \
            -not -name "*_test.rs" \
            -not -path "*/cli/src/bin/*" \
            -not -name "main.rs" \
            -not -path "*/openracing-test-helpers/*" \
            -not -path "*/openracing-capture-ids/*" \
            -not -path "*/hid-capture/*" \
            -exec grep -l -P '^\s*(?!.*///).*\.unwrap\(\)' {} \; 2>/dev/null || true)
          # Filter out files where unwrap() only appears in #[cfg(test)] blocks
          REAL_VIOLATIONS=""
          for file in $UNWRAP_VIOLATIONS; do
            TEST_LINE=$(grep -n '#\[cfg(test)\]' "$file" 2>/dev/null | head -1 | cut -d: -f1)
            if [ -n "$TEST_LINE" ]; then
              PRE_TEST_UNWRAPS=$(head -n "$((TEST_LINE - 1))" "$file" | grep -c '\.unwrap()' 2>/dev/null || true)
              if [ "$PRE_TEST_UNWRAPS" -gt 0 ]; then
                REAL_VIOLATIONS="$REAL_VIOLATIONS $file"
              fi
            else
              REAL_VIOLATIONS="$REAL_VIOLATIONS $file"
            fi
          done
          if [ -n "$REAL_VIOLATIONS" ]; then
            echo "❌ unwrap() usage found in non-test production code. Use proper error handling."
            echo "Found in files:"
            echo "$REAL_VIOLATIONS" | tr ' ' '\n' | grep -v '^$'
            exit 1
          fi

          echo "✅ Additional governance checks passed"
        shell: bash

  performance-gate:
    name: Performance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [pr-change-filter, lint-gates]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.perf_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'perf') ||
      contains(github.event.pull_request.labels.*.name, 'release')
    # Hosted-runner performance is advisory for ordinary PRs. Run it for
    # perf-sensitive paths, explicit labels, push-to-main/develop, and manual
    # dispatch; strict timing remains in the timing-gates workflow.

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config python3

      - name: Set CPU governor to performance
        run: |
          echo 'GOVERNOR="performance"' | sudo tee /etc/default/cpufrequtils
          sudo systemctl disable ondemand 2>/dev/null || true
          sudo systemctl enable cpufrequtils 2>/dev/null || true
          sudo cpufreq-set -g performance 2>/dev/null || true

      - name: Set RT scheduling limits
        run: |
          echo "$(whoami) soft rtprio 99" | sudo tee -a /etc/security/limits.conf
          echo "$(whoami) hard rtprio 99" | sudo tee -a /etc/security/limits.conf
          echo "$(whoami) soft memlock unlimited" | sudo tee -a /etc/security/limits.conf
          echo "$(whoami) hard memlock unlimited" | sudo tee -a /etc/security/limits.conf

      - name: Build release with RT profile
        run: cargo build --profile rt --bin wheeld --locked

      - name: Run RT timing benchmarks with JSON output
        env:
          # Enable custom JSON output format for performance validation
          # This produces output compatible with scripts/validate_performance.py
          BENCHMARK_JSON_OUTPUT: "1"
          BENCHMARK_JSON_PATH: "bench_results.json"
        run: |
          echo "Running RT timing benchmarks..."
          echo "Performance thresholds (from tech.md and Requirements 14.3, 14.4):"
          echo "  - RT Loop Total: ≤ 1000μs @ 1kHz"
          echo "  - P99 Jitter: ≤ 0.25ms (250μs)"
          echo "  - Missed Tick Rate: ≤ 0.001%"
          echo "  - Processing Time Median: ≤ 50μs"
          echo "  - Processing Time P99: ≤ 200μs"
          echo ""
          # Run the benchmark - it will output JSON to BENCHMARK_JSON_PATH
          cargo bench --bench rt_timing --locked
          echo ""
          echo "Benchmark results written to bench_results.json"

      - name: Validate performance gates
        run: |
          echo "Validating performance gates against thresholds..."
          # Requirement 14.2: WHEN benchmark results exceed thresholds, THE CI_Pipeline SHALL fail the build
          # Requirement 14.5: WHEN performance regresses, THE CI_Pipeline SHALL report the specific metric that failed
          #
          # CI runners lack real-time scheduling (SCHED_FIFO / MMCSS), so jitter
          # and loop-total metrics regularly exceed thresholds due to runner noise.
          # Use --warn-only on PR branches to surface regressions without blocking
          # merges on infrastructure limitations.  The strict gate remains active
          # on push-to-main and workflow_dispatch runs.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/validate_performance.py bench_results.json --warn-only --verbose
          else
            python3 scripts/validate_performance.py bench_results.json --strict --verbose
          fi

      - name: Generate performance report
        if: always()
        run: |
          # Generate detailed performance report for review
          python3 scripts/validate_performance.py bench_results.json --report performance_report.md --verbose || true

      - name: Check for RT heap allocations
        run: |
          # Additional check for zero allocations in RT path
          RUST_LOG=debug cargo test --release --locked test_zero_alloc_rt_path 2>/dev/null || echo "RT heap allocation test not found, skipping"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            bench_results.json
            performance_report.md

  security-audit:
    name: Security & License Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-change-filter, lint-gates]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.dependency_paths == 'true' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'dependency') ||
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run security audit
        run: |
          # Ignore RUSTSEC-2026-0049: rustls-webpki 0.102.8 is a transitive dep
          # from tauri -> reqwest -> rustls 0.22.4. Cannot upgrade without a
          # tauri major bump. The 0.103.x line uses the fixed version (0.103.10).
          # See deny.toml for full rationale.
          cargo audit --ignore RUSTSEC-2026-0049

      - name: Check licenses and dependencies
        run: cargo deny check

      - name: Generate third-party license report
        run: |
          cargo tree --format "{p} {l}" | grep -v "racing-wheel" | sort | uniq > third_party_licenses.txt

      - name: Validate ADR format and references
        run: |
          cargo run -p openracing-tools --bin validate-adr -- --verbose

      - name: Generate documentation index
        run: |
          cargo run -p openracing-tools --bin generate-docs-index --

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: third-party-licenses-${{ github.sha }}
          path: third_party_licenses.txt

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation-${{ github.sha }}
          path: |
            docs/adr/INDEX.md
            third_party_licenses.txt

  cross-platform-performance:
    name: Cross-Platform Performance
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [lint-gates]
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config python3

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows-specific RT setup would go here
          echo "Windows RT setup"

      - name: Build RT profile
        run: cargo build --profile rt --bin wheeld --locked

      - name: Run platform-specific RT benchmarks
        env:
          # Enable custom JSON output format for performance validation
          BENCHMARK_JSON_OUTPUT: "1"
          BENCHMARK_JSON_PATH: "bench_results_${{ matrix.os }}.json"
        run: |
          cargo bench --bench rt_timing --locked

      - name: Validate performance (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Use --warn-only on PRs; CI runners lack RT scheduling.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/validate_performance.py bench_results_${{ matrix.os }}.json --warn-only --verbose
          else
            python3 scripts/validate_performance.py bench_results_${{ matrix.os }}.json --verbose
          fi

      - name: Validate performance (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Use --warn-only on PRs; CI runners lack RT scheduling.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/validate_performance.py bench_results_${{ matrix.os }}.json --warn-only --verbose
          else
            python3 scripts/validate_performance.py bench_results_${{ matrix.os }}.json --verbose
          fi

      - name: Upload platform benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ matrix.os }}-${{ github.sha }}
          path: bench_results_${{ matrix.os }}.json

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [lint-gates]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        env:
          OPENRACING_SKIP_TIMING_GUARANTEES: "1"
          OPENRACING_USE_VIRTUAL_DEVICES: "1"
        run: |
          cargo llvm-cov --all-features --workspace --locked \
            --exclude racing-wheel-ui \
            --exclude racing-wheel-integration-tests \
            --ignore-filename-regex '(\.pb\.rs$|/tests/|/benches/|/fuzz/|/build\.rs$|_test\.rs$|/target/)' \
            --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: lcov.info
          # Codecov uploads are subject to transient rate limits (HTTP 429).
          # Don't let an upload failure block the CI pipeline.
          fail_ci_if_error: false

  # Final validation: Complete workspace compilation and integration
  final-validation:
    name: Final Workspace Validation
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: [pr-change-filter, performance-gate, security-audit, feature-combinations]
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.ci_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'release')
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/share/swift \
            /usr/local/share/boost /usr/share/az_*
          df -h /

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.4

      - *sccache_best_effort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            pkg-config

      - name: Final workspace build verification
        run: cargo build --workspace --exclude racing-wheel-ui --locked

      - name: Final workspace test compilation
        run: cargo test --workspace --exclude racing-wheel-ui --no-run --locked

      - name: Verify all isolation builds still work
        run: |
          cargo build -p wheelctl --locked
          cargo build -p racing-wheel-service --locked  
          cargo build -p racing-wheel-plugins --locked

      - name: Verify all feature combinations
        run: |
          cargo build --workspace --exclude racing-wheel-ui --all-features --locked
          cargo build --workspace --exclude racing-wheel-ui --no-default-features --locked

      - name: Run comprehensive test suite
        env:
          OPENRACING_USE_VIRTUAL_DEVICES: "1"
        run: cargo test --workspace --exclude racing-wheel-ui --locked

      - name: Ensure tests did not mutate profile fixtures
        run: git diff --exit-code -- crates/service/profiles

      - name: Validate cross-platform compatibility
        run: |
          echo "Cross-platform validation complete for ${{ matrix.os }}"
          echo "All isolation builds: ✅"
          echo "All feature combinations: ✅" 
          echo "Complete workspace: ✅"

  pr-required-baseline:
    name: PR Required Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - pr-change-filter
      - changelog-validation
      - docs-policy-checks
    if: always()
    env:
      NEEDS_JSON: ${{ toJson(needs) }}
      DOCS_ONLY: ${{ needs.pr-change-filter.outputs.docs_only }}
      MOZ_PATHS: ${{ needs.pr-change-filter.outputs.moza_paths }}
      DEPENDENCY_PATHS: ${{ needs.pr-change-filter.outputs.dependency_paths }}
      CI_PATHS: ${{ needs.pr-change-filter.outputs.ci_paths }}
      PERF_PATHS: ${{ needs.pr-change-filter.outputs.perf_paths }}
      SCHEMA_PATHS: ${{ needs.pr-change-filter.outputs.schema_paths }}
      WORKSPACE_PATHS: ${{ needs.pr-change-filter.outputs.workspace_paths }}

    steps:
      - name: Summarize baseline PR gates
        shell: python
        run: |
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])

          def require(job: str) -> None:
              result = needs.get(job, {}).get("result")
              if result != "success":
                  failures.append(f"{job}={result}")

          failures: list[str] = []

          require("pr-change-filter")
          require("changelog-validation")
          require("docs-policy-checks")

          if failures:
              print("Baseline PR gates failed or did not complete:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("Baseline PR gates completed successfully.")
          print(
              "Surface flags: "
              f"docs_only={os.environ.get('DOCS_ONLY', '')}, "
              f"moza_paths={os.environ.get('MOZ_PATHS', '')}, "
              f"dependency_paths={os.environ.get('DEPENDENCY_PATHS', '')}, "
              f"ci_paths={os.environ.get('CI_PATHS', '')}, "
              f"perf_paths={os.environ.get('PERF_PATHS', '')}, "
              f"schema_paths={os.environ.get('SCHEMA_PATHS', '')}, "
              f"workspace_paths={os.environ.get('WORKSPACE_PATHS', '')}"
          )
