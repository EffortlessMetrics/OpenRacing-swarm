name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  pr-change-filter:
    name: Integration Change Filter
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      integration_paths: ${{ steps.filter.outputs.integration_paths }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - id: filter
      name: Classify integration-relevant paths
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "integration_paths=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        base_ref="origin/${{ github.base_ref }}"
        git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
        if git merge-base "$base_ref" HEAD >/dev/null 2>&1; then
          mapfile -t changed < <(git diff --name-only "$base_ref...HEAD")
        else
          mapfile -t changed < <(git diff --name-only "$base_ref" HEAD)
        fi

        integration_paths=false
        if printf '%s\n' "${changed[@]}" | grep -E '^(\.github/workflows/integration-tests\.yml$|Cargo\.toml$|Cargo\.lock$|workspace-hack/|crates/(engine|service|plugins|integration-tests|openracing-ffb|openracing-hardware-core|openracing-hardware-watchdog|openracing-pipeline|openracing-scheduler|openracing-watchdog|openracing-telemetry-streams|telemetry-[^/]+)/)' >/dev/null; then
          integration_paths=true
        fi

        echo "integration_paths=$integration_paths" >> "$GITHUB_OUTPUT"

  # Quick smoke tests and unit tests
  smoke-tests:
    name: Smoke Tests
    needs: pr-change-filter
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.integration_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: self-hosted
    timeout-minutes: 45
    
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
        df -h /
    
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run smoke test
      run: cargo test test_smoke_test --package racing-wheel-integration-tests --locked
    
    - name: Run unit tests
      env:
        OPENRACING_SKIP_TIMING_GUARANTEES: "1"
        OPENRACING_USE_VIRTUAL_DEVICES: "1"
      run: |
        # Keep smoke bounded/deterministic: exclude long-running perf/atomicity tests here.
        # These behaviors are covered by dedicated performance and soak CI lanes.
        cargo test --workspace --locked \
          --exclude racing-wheel-integration-tests \
          --exclude racing-wheel-ui \
          -- \
          --skip jitter_isolation_tests \
          --skip cpu_usage_isolation \
          --skip haptics_frequency_range \
          --skip test_comprehensive_suite \
          --skip test_torque_limit_enforcement \
          --skip test_end_to_end_performance_requirements \
          --skip test_pipeline_swap_atomicity_under_load \
          --skip stress_torque_saturation_no_torn_reads \
          --skip stress_telemetry_loss_no_torn_reads

  # Performance gates (critical for CI)
  performance-gates:
    name: Performance Gates
    needs: pr-change-filter
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.integration_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'perf') ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: self-hosted
    timeout-minutes: 15
    
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
    
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build integration tests
      run: cargo build --package racing-wheel-integration-tests --features ci-gates --release --locked

    - name: Run performance gates
      run: cargo run --package racing-wheel-integration-tests --bin performance-gate --features ci-gates --release --locked
    
    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: target/performance-*.json

  # User journey tests
  user-journeys:
    name: User Journey Tests
    needs: pr-change-filter
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.integration_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: self-hosted
    timeout-minutes: 20
    
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
    
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run user journey tests
      run: |
        cargo test test_user_journey_uj01_first_run --package racing-wheel-integration-tests --features ci-gates --locked
        cargo test test_user_journey_uj02_profile_switching --package racing-wheel-integration-tests --features ci-gates --locked
        cargo test test_user_journey_uj03_fault_recovery --package racing-wheel-integration-tests --features ci-gates --locked
        cargo test test_user_journey_uj04_debug_workflow --package racing-wheel-integration-tests --features ci-gates --locked

  # Stress tests
  stress-tests:
    name: Stress Tests
    needs: pr-change-filter
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.integration_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'stress') ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: self-hosted
    timeout-minutes: 30
    
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
    
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run CI-bounded hot-plug stress test
      # Full stress/fault suites are exercised via soak and extended stress lanes;
      # this PR gate keeps only a deterministic bounded stress signal.
      run: cargo test -p racing-wheel-integration-tests test_hotplug_stress_basic --locked -- --exact
    
    - name: Upload stress test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stress-test-results
        path: target/stress-*.json

  # CI soak test (15 minutes)
  ci-soak-test:
    name: CI Soak Test
    needs: pr-change-filter
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.integration_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'soak') ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: self-hosted
    timeout-minutes: 30
    
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
    
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run CI soak test
      run: cargo run --package racing-wheel-integration-tests --bin soak-test --release --locked -- --mode ci
    
    - name: Upload soak test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: soak-test-results
        path: target/soak-*.json

  # Acceptance tests
  acceptance-tests:
    name: Acceptance Tests
    needs: pr-change-filter
    if: >-
      github.event_name != 'pull_request' ||
      needs.pr-change-filter.outputs.integration_paths == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'acceptance') ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: self-hosted
    timeout-minutes: 25
    
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
    
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run acceptance tests
      env:
        OPENRACING_USE_VIRTUAL_DEVICES: "1"
      run: cargo test test_acceptance_tests_subset --package racing-wheel-integration-tests --features ci-gates --locked
    
    - name: Upload acceptance test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: acceptance-test-report
        path: target/acceptance_test_report.json

  # Cross-platform tests
  cross-platform:
    name: Cross-Platform Tests
    needs: pr-change-filter
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        needs.pr-change-filter.outputs.integration_paths == 'true' &&
        (contains(github.event.pull_request.labels.*.name, 'windows') ||
         contains(github.event.pull_request.labels.*.name, 'macos') ||
         contains(github.event.pull_request.labels.*.name, 'platform')))
    strategy:
      matrix:
        os: [self-hosted, self-hosted, self-hosted]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
    - name: Free disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
    
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run platform-specific tests
      run: cargo test test_performance_gates_ffb_jitter --package racing-wheel-integration-tests --features ci-gates --locked
