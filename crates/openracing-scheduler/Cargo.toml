[package]
name = "openracing-scheduler"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Absolute scheduling with PLL drift correction and jitter tracking for real-time systems"


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack", "thiserror"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-scheduler"
readme = "README.md"
keywords = ["scheduler", "real-time", "pll", "timing", "openracing"]
categories = ["concurrency", "embedded"]
[dependencies]
thiserror = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62.2", features = [
    "Win32_System_Threading",
    "Win32_Foundation",
    "Win32_Security",
] }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[dev-dependencies]
quickcheck = { workspace = true }
quickcheck_macros = { workspace = true }
proptest = { workspace = true }
criterion = { workspace = true }
tokio = { workspace = true, features = ["time", "rt", "macros"] }

[features]
default = []

[[bench]]
name = "scheduler_bench"
harness = false

[[test]]
name = "integration"
path = "tests/integration.rs"

[[test]]
name = "property_tests"
path = "tests/property_tests.rs"

[[test]]
name = "proptest_edge_cases"
path = "tests/proptest_edge_cases.rs"

[[test]]
name = "scheduler_deep_tests"
path = "tests/scheduler_deep_tests.rs"

[[test]]
name = "scheduler_timing_deep_tests"
path = "tests/scheduler_timing_deep_tests.rs"

[[test]]
name = "scheduler_metrics_tests"
path = "tests/scheduler_metrics_tests.rs"

[[test]]
name = "scheduler_platform_tests"
path = "tests/scheduler_platform_tests.rs"

[[test]]
name = "adaptive_scheduling_tests"
path = "tests/adaptive_scheduling_tests.rs"

[[test]]
name = "cross_platform_tests"
path = "tests/cross_platform_tests.rs"

[lints]
workspace = true
