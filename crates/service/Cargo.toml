[package]
name = "racing-wheel-service"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/racing-wheel-service"
readme = "README.md"
description = "Background service daemon for OpenRacing hardware management"
keywords = ["service", "daemon", "hardware", "racing", "openracing"]
categories = ["game-development", "hardware-support"]
[[bin]]
name = "wheeld"
path = "src/main.rs"

[features]
default = []
# Legacy feature flag - keygen is now always available
keygen = []


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack", "libudev", "openracing-ipc"]

[dependencies]
racing-wheel-schemas = { path = "../schemas", version = "0.1.0" }
racing-wheel-engine = { path = "../engine", version = "0.1.0" }
racing-wheel-telemetry-core = { path = "../telemetry-core", version = "0.1.0", features = ["orchestrator"] }
racing-wheel-telemetry-adapters = { path = "../telemetry-adapters", version = "0.1.0" }
racing-wheel-telemetry-recorder = { path = "../telemetry-recorder", version = "0.1.0" }
racing-wheel-telemetry-config = { path = "../telemetry-config", version = "0.1.0" }
racing-wheel-changelog = { workspace = true }
openracing-errors = { workspace = true }
openracing-hid-common = { workspace = true }
openracing-profile-repository = { workspace = true }
openracing-ipc = { workspace = true }
tokio = { workspace = true }
tonic = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { package = "serde_yaml_ng", version = "0.10.0" }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
hidapi = { workspace = true }
async-trait = { workspace = true }
chrono = { version = "0.4.43", features = ["serde"] }
uuid = { workspace = true }
quick-xml = { workspace = true }
async-stream = "0.3.6"
tokio-stream = "0.1.18"
prost-types = { workspace = true }
ed25519-dalek = { version = "2.2.0", features = ["rand_core"] }
rand = "0.8.5"
base64 = "0.22.1"
sha2 = "0.10.9"
walkdir = "2.5.0"
hex = "0.4.3"
goblin = "0.9"
semver = { version = "1.0.27", features = ["serde"] }
flate2 = "1.1.9"
futures = "0.3.32"
prometheus = { workspace = true }
metrics = { workspace = true }
sysinfo = { workspace = true }
axum = "0.8.8"
clap = { workspace = true }
os_info = { workspace = true }
num_cpus = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
insta = { version = "1.46.3", features = ["yaml", "json"] }
rand = "0.8.5"
tempfile = "3.25.0"
tracing-test = "0.2.5"
proptest = { workspace = true }
racing-wheel-telemetry-support = { path = "../telemetry-support", version = "0.1.0" }
zip = "7.2.0"

[target.'cfg(target_os = "linux")'.dependencies]
libudev = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3.9", features = [
    "handleapi",
    "memoryapi",
    "winnt",
    "synchapi",
    "tlhelp32",
] }
winreg = "0.52"

[lints]
workspace = true
