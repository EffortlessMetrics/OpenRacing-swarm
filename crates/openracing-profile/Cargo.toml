[package]
name = "openracing-profile"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]
development = ["proptest", "quickcheck"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-profile"
readme = "README.md"
description = "Profile data types and serialization for OpenRacing force feedback tuning"
keywords = ["profile", "ffb", "tuning", "config", "openracing"]
categories = ["game-development", "hardware-support"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
uuid = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
insta = { workspace = true, features = ["json", "redactions"] }
proptest = { workspace = true }
quickcheck = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
