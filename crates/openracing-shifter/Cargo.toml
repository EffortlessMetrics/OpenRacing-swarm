[package]
name = "openracing-shifter"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-shifter"
readme = "README.md"
description = "Sequential and H-pattern shifter device types for OpenRacing"
keywords = ["shifter", "racing", "sequential", "h-pattern", "openracing"]
categories = ["game-development", "hardware-support"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
proptest = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
