[package]
name = "openracing-hardware-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Hardware validation state and evidence primitives for OpenRacing"
keywords = ["hardware", "validation", "safety", "evidence", "openracing"]
categories = ["data-structures", "hardware-support"]
publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-hardware-core"

[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
serde_json = { workspace = true }

[lints]
workspace = true
