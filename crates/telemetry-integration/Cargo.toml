[package]
name = "racing-wheel-telemetry-integration"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/racing-wheel-telemetry-integration"
publish = false
description = "Utilities for validating telemetry matrix and runtime registry parity."
readme = "README.md"
keywords = ["telemetry", "racing", "matrix", "integration", "compatibility"]


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

categories = ["game-development", "development-tools"]
[dependencies]
racing-wheel-telemetry-bdd-metrics = { path = "../telemetry-bdd-metrics", version = "0.1.0" }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
openracing-telemetry-adapters = { path = "../telemetry-adapters", version = "0.1.0" }
racing-wheel-telemetry-rate-limiter = { path = "../telemetry-rate-limiter", version = "0.1.0" }
openracing-telemetry-recorder = { path = "../telemetry-recorder", version = "0.1.0" }
racing-wheel-telemetry-support = { path = "../telemetry-support", version = "0.1.0" }
tempfile = "3.25.0"
tokio = { workspace = true }

[lints]
workspace = true
