[package]
name = "openracing-diagnostic"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Diagnostic recording and replay system for OpenRacing"
keywords = ["diagnostic", "blackbox", "replay", "recording", "real-time"]
categories = ["development-tools::debugging", "aerospace::simulation"]


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-diagnostic"
readme = "README.md"
[dependencies]
bincode = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
flate2 = "1.1.9"
zip = "7.2.0"
sysinfo = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
tempfile = "3.25.0"
criterion = { workspace = true }
insta = "1.46.3"

[features]
default = ["std"]
std = []

[[bench]]
name = "recording_throughput"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
