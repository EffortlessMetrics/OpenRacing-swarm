[package]
name = "racing-wheel-simplemotion-v2"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/racing-wheel-simplemotion-v2"
readme = "README.md"
description = "SimpleMotion V2 serial protocol for Granite Devices servo controllers"
keywords = ["simplemotion", "servo", "serial", "granite", "motor"]
categories = ["hardware-support", "embedded"]
[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack", "tracing"]

[dependencies]
tracing = { workspace = true }
thiserror = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
proptest = { workspace = true }
insta = { version = "1.46.3", features = ["yaml"] }

[lints]
workspace = true
