[package]
name = "racing-wheel-schemas"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/racing-wheel-schemas"
readme = "README.md"
description = "Protobuf schemas and domain models for OpenRacing IPC and configuration"
keywords = ["schemas", "protobuf", "ipc", "openracing", "grpc"]
categories = ["game-development", "data-structures"]
[dependencies]
prost = { workspace = true }
prost-types = { workspace = true }
tonic = { workspace = true }
tonic-prost = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
jsonschema = { workspace = true }
chrono = { workspace = true }
openracing-errors = { workspace = true }
openracing-hid-common = { workspace = true }
tracing = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[build-dependencies]
prost-build = { workspace = true }
tonic-prost-build = { workspace = true }
protoc-bin-vendored = { workspace = true }

[dev-dependencies]
trybuild = "1.0.114"
proptest = { workspace = true }
tempfile = "3.25.0"
insta = { workspace = true, features = ["json"] }

[lints]
workspace = true
