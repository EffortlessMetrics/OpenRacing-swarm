[package]
name = "openracing-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false
description = "Repository maintenance tools for OpenRacing"

[[bin]]
name = "validate-adr"
path = "src/bin/validate_adr.rs"

[[bin]]
name = "generate-docs-index"
path = "src/bin/generate_docs_index.rs"

[[bin]]
name = "yaml-sync-check"
path = "src/bin/yaml_sync_check.rs"

[[bin]]
name = "check-glob-reexports"
path = "src/bin/check_glob_reexports.rs"

[[bin]]
name = "check-private-imports"
path = "src/bin/check_private_imports.rs"

[[bin]]
name = "xtask"
path = "src/bin/xtask.rs"

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }

[lints]
workspace = true

[dev-dependencies]
tempfile = "3.25.0"
