[package]
name = "openracing-hid-common"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack", "hidapi", "racing-wheel-schemas", "tracing"]
development = ["proptest", "quickcheck"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-hid-common"
readme = "README.md"
description = "Common abstractions for USB HID device communication in OpenRacing"
keywords = ["hid", "usb", "common", "device", "openracing"]
categories = ["game-development", "hardware-support"]
[dependencies]
hidapi = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
proptest = { workspace = true }
quickcheck = { workspace = true }
criterion = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
serde_json = { workspace = true }
insta = { workspace = true, features = ["json"] }

[[bench]]
name = "hid_benches"
harness = false

[lints]
workspace = true
