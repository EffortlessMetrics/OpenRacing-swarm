[package]
name = "openracing-telemetry-streams"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-telemetry-streams"
readme = "README.md"
description = "In-memory telemetry data channels for real-time streaming in OpenRacing"
keywords = ["telemetry", "streaming", "channels", "real-time", "openracing"]
categories = ["game-development", "hardware-support"]

[package.metadata.cargo-udeps.ignore]
normal = ["serde", "tokio"]

[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt"] }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]

[lints]
workspace = true
