[package]
name = "openracing-telemetry"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-telemetry"
publish = true
description = "Telemetry domain models and disconnection state for OpenRacing"
readme = "README.md"
keywords = ["telemetry", "racing", "ffb", "connection", "normalization"]

categories = ["game-development"]
[features]
default = []
orchestrator = ["dep:openracing-telemetry-recorder", "dep:openracing-telemetry-config", "dep:tracing"]


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
racing-wheel-schemas = { path = "../schemas", version = "0.1.0" }
openracing-telemetry-recorder = { path = "../telemetry-recorder", version = "0.1.0", optional = true }
openracing-telemetry-config = { path = "../telemetry-config", version = "0.1.0", optional = true }
tracing = { workspace = true, optional = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
serde_json = { workspace = true }
proptest = { workspace = true }

[lints]
workspace = true
