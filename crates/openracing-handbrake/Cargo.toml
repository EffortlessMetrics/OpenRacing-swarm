[package]
name = "openracing-handbrake"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]
development = ["proptest", "quickcheck"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-handbrake"
readme = "README.md"
description = "Analog handbrake device types and calibration for OpenRacing"
keywords = ["handbrake", "racing", "analog", "calibration", "openracing"]
categories = ["game-development", "hardware-support"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
proptest = { workspace = true }
quickcheck = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
