[package]
name = "openracing-wasm-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "WASM plugin runtime with capability-based sandboxing for OpenRacing"


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-wasm-runtime"
readme = "README.md"
keywords = ["wasm", "runtime", "sandbox", "plugin", "openracing"]
categories = ["wasm"]
[dependencies]
openracing-plugin-abi = { workspace = true }
wasmtime = "43.0.2"
wasmtime-wasi = "43.0.2"
tokio = { workspace = true, features = ["sync", "time", "fs"] }
tracing = { workspace = true }
thiserror = { workspace = true }
uuid = { version = "1.21.0", features = ["v4", "serde"] }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
wat = "1.243.0"
tempfile = "3.25.0"
proptest = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "runtime_bench"
harness = false

[features]
default = []

[lints]
workspace = true
