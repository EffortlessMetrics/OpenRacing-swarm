[package]
name = "openracing-watchdog"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Watchdog systems for monitoring plugin execution and system health in OpenRacing"
keywords = ["watchdog", "monitoring", "health-check", "real-time", "safety"]
categories = ["concurrency", "development-tools::debugging"]


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-watchdog"
readme = "README.md"
[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
openracing-fmea = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
proptest = { workspace = true }
criterion = { workspace = true }
insta = { workspace = true }

[features]
default = ["std"]
std = []

[[bench]]
name = "watchdog_benchmark"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
