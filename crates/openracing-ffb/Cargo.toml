[package]
name = "openracing-ffb"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true


[package.metadata.cargo-udeps.ignore]
normal = ["workspace-hack", "thiserror"]
development = ["quickcheck"]

publish = true
homepage = "https://github.com/EffortlessMetrics/OpenRacing"
documentation = "https://docs.rs/openracing-ffb"
readme = "README.md"
description = "Force feedback core calculations, effects, and torque output for OpenRacing"
keywords = ["ffb", "force-feedback", "torque", "haptics", "openracing"]
categories = ["game-development", "hardware-support"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[dev-dependencies]
insta = { workspace = true, features = ["json"] }
proptest = { workspace = true }
quickcheck = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
